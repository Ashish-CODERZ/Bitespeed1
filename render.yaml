services:
  - type: web
    name: bitespeed-identity-service
    runtime: node
    plan: free
    buildCommand: npm ci && npm run prisma:generate
    startCommand: npm run prisma:db:push && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
